# Example Nginx site config for this WhatsApp bot (reverse proxy -> Node.js on :4000)
#
# Usage (Ubuntu/Debian):
# - Copy to: /etc/nginx/sites-available/whatsapp-bot.conf
# - Edit: server_name + (optional) SSL paths
# - Enable: ln -s /etc/nginx/sites-available/whatsapp-bot.conf /etc/nginx/sites-enabled/
# - Test: nginx -t
# - Reload: systemctl reload nginx
#
# Notes:
# - This config forwards EVERYTHING to Node (including /webhook and /media/*).
# - Increase client_max_body_size if you raise MAX_FILE_SIZE.

server {
  listen 80;
  server_name your-domain.com;

  client_max_body_size 20m;

  # If you use Certbot, it needs this path.
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    proxy_pass http://127.0.0.1:4000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # WebSocket (used by some admin features)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 65s;
    proxy_send_timeout 65s;
  }
}

# After HTTPS is installed (Certbot/Caddy/Cloudflare), make sure your public domain is HTTPS.
# Then set in .env.production.local:
#   PUBLIC_BASE_URL=https://your-domain.com
# And (recommended) restrict outbound image domains:
#   WHATSAPP_IMAGE_URL_ALLOWLIST=your-domain.com
